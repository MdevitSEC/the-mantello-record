---
layout: default
---

<div class="page-full">
  <div class="page-full-inner">
    <header class="page-header">
      <h1 class="page-title">{{ page.title }}</h1>
      {% if page.subtitle %}<p class="page-subtitle">{{ page.subtitle }}</p>{% endif %}
    </header>
    <div class="page-body">
      {{ content }}
    </div>
  </div>
</div>
